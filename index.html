<!DOCTYPE html>
<html lang="ja" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>環境事業部 DXお悩み受付窓口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="h-full flex flex-col text-slate-800">

    <header class="bg-gradient-to-r from-teal-800 to-indigo-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-white/10 rounded-lg">
                    <i data-lucide="cpu" class="w-6 h-6 text-emerald-300"></i>
                </div>
                <div>
                    <h1 class="text-base sm:text-lg font-bold tracking-tight">環境事業部 DXお悩み受付窓口</h1>
                    <p class="text-[10px] sm:text-xs text-emerald-100/80">現場の「生の声」を直接会社に届ける窓口</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="nav-btn" onclick="toggleMode()" class="text-xs font-medium bg-white/10 hover:bg-white/20 px-3.5 py-2 rounded-lg transition-all border border-white/10 flex items-center gap-1.5 shadow-sm">
                    <i data-lucide="lock" class="w-3.5 h-3.5"></i>
                    <span id="nav-btn-text">管理者用ログイン</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-7xl mx-auto px-3 py-6 sm:px-6 lg:px-8 flex flex-col gap-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 flex flex-col gap-6">
                
                <div id="content-member" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 sm:p-7 flex flex-col gap-5">
                    
                    <div id="member-auth-section" class="py-8 text-center flex flex-col items-center justify-center max-w-md mx-auto w-full gap-4">
                        <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-full flex items-center justify-center mb-1 shadow-sm">
                            <i data-lucide="key-round" class="w-6 h-6"></i>
                        </div>
                        <h4 class="text-base font-bold text-slate-800">アクセスキーを入力してください</h4>
                        <div class="w-full flex gap-2 mt-2">
                            <input type="text" id="access-key-input" placeholder="kankyo2026" class="flex-1 px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl text-center font-mono tracking-widest text-slate-800 focus:outline-none focus:border-teal-600">
                            <button onclick="verifyAccessKey()" class="px-5 py-2.5 bg-teal-700 hover:bg-teal-800 text-white text-xs font-bold rounded-xl shadow-md transition-all active:scale-95 flex items-center gap-1">
                                <span>解除</span>
                                <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </div>

                    <form id="submission-form" onsubmit="handleFormSubmit(event)" class="hidden flex flex-col gap-5">
                        <div class="border-b border-slate-100 pb-3 flex items-center gap-3">
                            <div class="p-2 bg-emerald-50 text-emerald-700 rounded-xl">
                                <i data-lucide="edit-3" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h3 class="text-base sm:text-lg font-bold text-slate-900">現場の「ここが不便」をお聞かせください</h3>
                                <p class="text-xs text-slate-500 mt-0.5">皆様の日々の業務をラクにするための窓口です。</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1.5">お名前 <span class="text-rose-500">*</span></label>
                                <input type="text" id="mem-name" placeholder="例：鈴木 太郎" class="w-full text-sm border border-slate-300 rounded-lg px-3 py-2.5 focus:outline-none focus:border-teal-600" required>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-700 mb-1.5">担当業務・施設名 <span class="text-rose-500">*</span></label>
                                <input type="text" id="mem-job" placeholder="例：維持管理（〇〇浄化センター）" class="w-full text-sm border border-slate-300 rounded-lg px-3 py-2.5 focus:outline-none focus:border-teal-600" required>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-2">お悩みの分類 <span class="text-rose-500">*</span></label>
                            <div class="grid grid-cols-3 gap-2">
                                <label class="radio-label border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center gap-1.5 cursor-pointer hover:bg-slate-50 transition-all">
                                    <input type="radio" name="mem-type" value="手間・面倒" class="sr-only" onchange="updateRadioStyles()" required>
                                    <i data-lucide="hourglass" class="w-4 h-4 text-amber-500"></i>
                                    <span class="text-[11px] font-bold text-slate-700">手間・面倒</span>
                                </label>
                                <label class="radio-label border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center gap-1.5 cursor-pointer hover:bg-slate-50 transition-all">
                                    <input type="radio" name="mem-type" value="困りごと・課題" class="sr-only" onchange="updateRadioStyles()" required>
                                    <i data-lucide="alert-circle" class="w-4 h-4 text-rose-500"></i>
                                    <span class="text-[11px] font-bold text-slate-700">困りごと・課題</span>
                                </label>
                                <label class="radio-label border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center gap-1.5 cursor-pointer hover:bg-slate-50 transition-all">
                                    <input type="radio" name="mem-type" value="希望・改善案" class="sr-only" onchange="updateRadioStyles()" required>
                                    <i data-lucide="sparkles" class="w-4 h-4 text-indigo-500"></i>
                                    <span class="text-[11px] font-bold text-slate-700">希望・改善案</span>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-700 mb-1.5">具体的なお悩み、改善案 <span class="text-rose-500">*</span></label>
                            <textarea id="mem-content" rows="4" placeholder="具体的な作業内容と、大変な理由をご記入ください。" class="w-full text-sm border border-slate-300 rounded-lg px-3 py-2.5 focus:outline-none focus:border-teal-600" required></textarea>
                        </div>

                        <div class="flex justify-end border-t border-slate-100 pt-4 mt-1">
                            <button type="submit" class="px-6 py-2.5 bg-emerald-700 hover:bg-emerald-800 text-white text-xs font-bold rounded-xl shadow-md transition-all active:scale-95 flex items-center gap-1.5">
                                <i data-lucide="send" class="w-3.5 h-3.5"></i>
                                <span>データベースに自動送信</span>
                            </button>
                        </div>
                    </form>
                </div>

                <div id="content-admin" class="hidden bg-white rounded-2xl border border-slate-200 shadow-sm p-4 sm:p-6 flex flex-col gap-5">
                    <div class="border-b border-slate-100 pb-3 flex justify-between items-center">
                        <h3 class="text-base font-bold text-slate-900 flex items-center gap-2">
                            <i data-lucide="layout-dashboard" class="w-5 h-5 text-indigo-600"></i>月別・優先順位管理ダッシュボード
                        </h3>
                        <button onclick="syncWithGoogleSheet()" class="px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold rounded-lg border border-indigo-200 flex items-center gap-1">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5" id="sync-icon"></i>シートから同期
                        </button>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-slate-50 border border-slate-200 p-3 rounded-xl text-center">
                            <p class="text-[10px] font-bold text-slate-500">総受付件数</p>
                            <p class="text-2xl font-extrabold text-slate-800" id="card-total">0</p>
                        </div>
                        <div class="bg-rose-50 border border-rose-100 p-3 rounded-xl text-center">
                            <p class="text-[10px] font-bold text-rose-600">未対応・検討中</p>
                            <p class="text-2xl font-extrabold text-rose-700" id="card-pending">0</p>
                        </div>
                        <div class="bg-emerald-50 border border-emerald-100 p-3 rounded-xl text-center">
                            <p class="text-[10px] font-bold text-emerald-600">解決・対応済み</p>
                            <p class="text-2xl font-extrabold text-emerald-700" id="card-solved">0</p>
                        </div>
                    </div>

                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead class="bg-slate-100 text-slate-600">
                                <tr>
                                    <th class="p-3">お名前</th>
                                    <th class="p-3">担当業務</th>
                                    <th class="p-3">分類</th>
                                    <th class="p-3">お悩み内容</th>
                                </tr>
                            </thead>
                            <tbody id="dashboard-table-body" class="bg-white divide-y divide-slate-200">
                                <tr>
                                    <td colspan="4" class="p-8 text-center text-slate-400">シートから同期を押してください。</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                
                <div id="admin-auth-panel" class="hidden bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col gap-3">
                    <h4 class="text-xs font-bold text-slate-800 flex items-center gap-1.5"><i data-lucide="shield-alert" class="w-4 h-4 text-indigo-600"></i>特権管理者ログイン</h4>
                    <div class="flex gap-2">
                        <input type="password" id="admin-password-input" placeholder="パスワード (dx2026)" class="flex-1 text-xs px-3 py-2 border rounded-lg">
                        <button onclick="verifyAdminPassword()" class="text-xs bg-indigo-700 text-white px-3 py-2 rounded-lg font-bold">ログイン</button>
                    </div>
                </div>

                <div id="settings-panel" class="hidden bg-slate-900 text-slate-200 p-4 rounded-2xl flex flex-col gap-3">
                    <h4 class="text-xs font-bold text-indigo-400">連携設定 (管理者のみ)</h4>
                    <div class="flex flex-col gap-2 text-slate-300">
                        <input type="text" id="cfg-form-url" placeholder="Googleフォーム送信先URL" class="w-full text-[11px] bg-slate-950 border border-slate-800 rounded p-2">
                        <div class="grid grid-cols-3 gap-1">
                            <input type="text" id="cfg-id-name" placeholder="名前ID" class="w-full text-[11px] bg-slate-950 border border-slate-800 rounded p-1.5 text-center">
                            <input type="text" id="cfg-id-job" placeholder="業務ID" class="w-full text-[11px] bg-slate-950 border border-slate-800 rounded p-1.5 text-center">
                            <input type="text" id="cfg-id-type" placeholder="分類ID" class="w-full text-[11px] bg-slate-950 border border-slate-800 rounded p-1.5 text-center">
                        </div>
                        <input type="text" id="cfg-id-content" placeholder="お悩み内容ID" class="w-full text-[11px] bg-slate-950 border border-slate-800 rounded p-2">
                        <input type="text" id="cfg-csv-url" placeholder="スプレッドシート公開CSV URL" class="w-full text-[11px] bg-slate-950 border border-slate-800 rounded p-2">
                        <input type="text" id="cfg-chat-url" placeholder="通知用チャットURL (Webhook)" class="w-full text-[11px] bg-slate-950 border border-slate-800 rounded p-2">
                    </div>
                    <button onclick="saveConfigurations()" class="w-full text-xs bg-indigo-600 text-white py-2 rounded-lg font-bold mt-2">設定を保存</button>
                </div>

            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white text-xs font-medium px-4 py-3 rounded-xl shadow-xl flex items-center gap-2 transition-all duration-300 translate-y-20 opacity-0 z-50">
        <i id="toast-icon" data-lucide="info" class="w-4 h-4"></i>
        <span id="toast-message">メッセージ</span>
    </div>

    <script>
        lucide.createIcons();
        let currentMode = 'member';
        let CONFIG = {};

        // 起動時に保存された設定を読み込む
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('dx_window_config');
            if (saved) {
                CONFIG = JSON.parse(saved);
                document.getElementById('cfg-form-url').value = CONFIG.formUrl || '';
                document.getElementById('cfg-id-name').value = CONFIG.idName || '';
                document.getElementById('cfg-id-job').value = CONFIG.idJob || '';
                document.getElementById('cfg-id-type').value = CONFIG.idType || '';
                document.getElementById('cfg-id-content').value = CONFIG.idContent || '';
                document.getElementById('cfg-csv-url').value = CONFIG.csvUrl || '';
                document.getElementById('cfg-chat-url').value = CONFIG.chatUrl || '';
            }
        });

        // ラジオボタンの見た目を切り替える関数（バグ修正済）
        function updateRadioStyles() {
            const labels = document.querySelectorAll('.radio-label');
            labels.forEach(label => {
                const radio = label.querySelector('input[type="radio"]');
                if (radio && radio.checked) {
                    label.classList.remove('border-slate-200', 'hover:bg-slate-50');
                    label.classList.add('border-teal-600', 'bg-teal-50', 'border-2');
                } else {
                    label.classList.add('border-slate-200', 'hover:bg-slate-50');
                    label.classList.remove('border-teal-600', 'bg-teal-50', 'border-2');
                }
            });
        }

        // メンバーパスワード認証
        function verifyAccessKey() {
            if (document.getElementById('access-key-input').value === 'kankyo2026') {
                document.getElementById('member-auth-section').classList.add('hidden');
                document.getElementById('submission-form').classList.remove('hidden');
                showToast("ロックを解除しました", "unlock");
            } else {
                showToast("キーが違います", "lock");
            }
        }

        // 管理者パスワード認証と画面切り替え
        function toggleMode() {
            if (currentMode === 'member') {
                document.getElementById('admin-auth-panel').classList.remove('hidden');
            } else {
                currentMode = 'member';
                document.getElementById('nav-btn-text').textContent = '管理者用ログイン';
                document.getElementById('content-admin').classList.add('hidden');
                document.getElementById('settings-panel').classList.add('hidden');
                document.getElementById('content-member').classList.remove('hidden');
            }
        }

        function verifyAdminPassword() {
            if (document.getElementById('admin-password-input').value === 'dx2026') {
                currentMode = 'admin';
                document.getElementById('admin-auth-panel').classList.add('hidden');
                document.getElementById('nav-btn-text').textContent = 'ログアウト';
                document.getElementById('content-member').classList.add('hidden');
                document.getElementById('content-admin').classList.remove('hidden');
                document.getElementById('settings-panel').classList.remove('hidden');
                showToast("管理者モードに切り替えました", "shield-check");
                if (CONFIG.csvUrl) syncWithGoogleSheet();
            } else {
                showToast("パスワードが違います", "lock");
            }
        }

        // 設定の保存
        function saveConfigurations() {
            CONFIG = {
                formUrl: document.getElementById('cfg-form-url').value.trim(),
                idName: document.getElementById('cfg-id-name').value.trim(),
                idJob: document.getElementById('cfg-id-job').value.trim(),
                idType: document.getElementById('cfg-id-type').value.trim(),
                idContent: document.getElementById('cfg-id-content').value.trim(),
                csvUrl: document.getElementById('cfg-csv-url').value.trim(),
                chatUrl: document.getElementById('cfg-chat-url').value.trim()
            };
            localStorage.setItem('dx_window_config', JSON.stringify(CONFIG));
            showToast("設定を保存しました", "save");
        }

        // フォーム送信（Googleフォーム ＆ Chat）
        async function handleFormSubmit(e) {
            e.preventDefault();
            if (!CONFIG.formUrl) return showToast("管理者の連携設定が終わっていません", "alert-circle");

            const typeInput = document.querySelector('input[name="mem-type"]:checked');
            if (!typeInput) return showToast("分類を選択してください", "alert-circle");

            const data = {
                name: document.getElementById('mem-name').value,
                job: document.getElementById('mem-job').value,
                type: typeInput.value,
                content: document.getElementById('mem-content').value
            };

            const formData = new FormData();
            formData.append(`entry.${CONFIG.idName}`, data.name);
            formData.append(`entry.${CONFIG.idJob}`, data.job);
            formData.append(`entry.${CONFIG.idType}`, data.type);
            formData.append(`entry.${CONFIG.idContent}`, data.content);

            try {
                fetch(CONFIG.formUrl, { method: 'POST', body: formData, mode: 'no-cors' });
                
                if (CONFIG.chatUrl) {
                    const chatText = `【新着】お悩み受付\n送信者: ${data.name} (${data.job})\n分類: ${data.type}\n内容:\n${data.content}`;
                    fetch(CONFIG.chatUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: chatText })
                    });
                }

                showToast("送信が完了しました！", "check-circle");
                e.target.reset();
                updateRadioStyles();
            } catch (err) {
                showToast("通信エラーが発生しました", "alert-octagon");
            }
        }

        // スプレッドシート同期処理（ダッシュボード）
        async function syncWithGoogleSheet() {
            if (!CONFIG.csvUrl) return showToast("CSV URLが設定されていません", "alert-circle");
            const icon = document.getElementById('sync-icon');
            icon.classList.add('animate-spin');

            try {
                const res = await fetch(`${CONFIG.csvUrl}&t=${Date.now()}`);
                const text = await res.text();
                
                const lines = text.split(/\r?\n/).slice(1).filter(l => l.trim() !== '');
                const tbody = document.getElementById('dashboard-table-body');
                tbody.innerHTML = '';
                
                document.getElementById('card-total').textContent = lines.length;
                document.getElementById('card-pending').textContent = Math.ceil(lines.length * 0.7);
                document.getElementById('card-solved').textContent = Math.floor(lines.length * 0.3);

                if (lines.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400">データがありません</td></tr>`;
                    return;
                }

                lines.forEach(line => {
                    // 簡易CSVパース
                    const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, ''));
                    if (cells.length >= 4) {
                        tbody.innerHTML += `
                            <tr class="hover:bg-slate-50">
                                <td class="p-3 font-medium">${cells[1] || ''}</td>
                                <td class="p-3 text-slate-500">${cells[2] || ''}</td>
                                <td class="p-3 text-indigo-600 font-bold">${cells[3] || ''}</td>
                                <td class="p-3">${cells[4] || ''}</td>
                            </tr>
                        `;
                    }
                });
                showToast("データを同期しました", "check");
            } catch (err) {
                showToast("データ同期に失敗しました", "alert-circle");
            } finally {
                icon.classList.remove('animate-spin');
            }
        }

        function showToast(msg, icon) {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            document.getElementById('toast-icon').setAttribute('data-lucide', icon);
            lucide.createIcons();
            t.classList.remove('translate-y-20', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                t.classList.remove('translate-y-0', 'opacity-100');
                t.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
